<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Brand Soluxions Inc.</title>
    <link rel="icon" type="image/png" href="assets/images/Logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #00a5a8 0%, #0077b6 100%);
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .card img { height: 60px; margin: 0 auto 20px; }
        .card h1 { font-size: 60px; font-weight: 700; color: #00a5a8; line-height: 1; }
        .card h2 { font-size: 20px; font-weight: 600; color: #1a1a2e; margin: 10px 0 8px; }
        .card p { font-size: 14px; color: #666; margin-bottom: 28px; }
        .card a {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #00a5a8, #0077b6);
            color: #fff;
            border-radius: 25px;
            font-weight: 500;
            font-size: 14px;
            text-decoration: none;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="assets/images/Logo.png" alt="Brand Soluxions Inc.">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you are looking for doesn't exist or has been moved.</p>
        <a href="index.html"><i class="fas fa-home" style="margin-right:8px;"></i>Back to Login</a>
    </div>
</body>
</html>
